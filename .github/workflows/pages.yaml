name: Deploy RSB HALAL KITCHEN Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: "🧾 Checkout repository"
        uses: actions/checkout@v4

      # 🔥 No cache — clean Node.js every run
      - name: "🧰 Setup Node.js (fresh)"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 🔥 Clean install — zero caching
      - name: "📦 Install dependencies (fresh)"
        run: npm ci

      - name: "🏗️ Build Vite project"
        run: npm run build

      - name: "🪄 Add 404 fallback for SPA routing"
        run: cp dist/index.html dist/404.html

      # 🔥 Force GitHub Pages to bust cache
      - name: "🧨 Cache buster"
        run: echo "build-$(date +%s)" > dist/.build-id.txt

      - name: "⚙️ Disable Jekyll"
        run: touch dist/.nojekyll

      - name: "📤 Upload artifact"
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: "🚀 Deploy to GitHub Pages"
        id: deployment
        uses: actions/deploy-pages@v4
